<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb3cf"/>
      <stop offset="35%" stop-color="#ff6fa5"/>
      <stop offset="70%" stop-color="#d94fc4"/>
      <stop offset="100%" stop-color="#9a3fc9"/>
    </linearGradient>
    <linearGradient id="liquidTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd6e6"/>
      <stop offset="50%" stop-color="#ff9fc9"/>
      <stop offset="100%" stop-color="#e77fe0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="straw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff92b8"/>
      <stop offset="45%" stop-color="#ff5e94"/>
      <stop offset="100%" stop-color="#e83f75"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="strawberrySkin" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ff7d8e"/>
      <stop offset="60%" stop-color="#f8394f"/>
      <stop offset="100%" stop-color="#c81f38"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="352" rx="82" ry="14" fill="url(#shadow)"/>

  <!-- glass body -->
  <path d="M118 96 H282 L254 330 Q200 352 146 330 Z" fill="#ffffff" fill-opacity="0.28"
        stroke="#ffffff" stroke-opacity="0.65" stroke-width="3"/>
  <!-- liquid -->
  <path d="M130 130 H270 L248 322 Q200 340 152 322 Z" fill="url(#liquid)"/>
  <!-- liquid surface -->
  <ellipse cx="200" cy="130" rx="70" ry="14" fill="url(#liquidTop)"/>
  <ellipse cx="185" cy="127" rx="24" ry="5" fill="#ffffff" opacity="0.55"/>
  <!-- glass shine streak -->
  <path d="M140 110 L120 320 L134 324 L154 112 Z" fill="url(#glass)"/>
  <!-- rim -->
  <ellipse cx="200" cy="96" rx="82" ry="13" fill="#ffffff"/>
  <ellipse cx="200" cy="96" rx="82" ry="13" fill="none" stroke="#e7e7f5" stroke-width="2"/>

  <!-- floating chia/fruit bits -->
  <circle cx="172" cy="200" r="3.4" fill="#ffe28a"/>
  <circle cx="222" cy="230" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="190" cy="260" r="3.6" fill="#ffe28a"/>
  <circle cx="235" cy="180" r="2.6" fill="#ffffff" opacity="0.7"/>

  <!-- condensation -->
  <ellipse cx="252" cy="160" rx="4" ry="6" fill="#eaf6ff" opacity="0.85"/>
  <ellipse cx="258" cy="200" rx="3" ry="5" fill="#eaf6ff" opacity="0.7"/>
  <ellipse cx="145" cy="230" rx="3.2" ry="5" fill="#eaf6ff" opacity="0.7"/>

  <!-- straw -->
  <rect x="196" y="18" width="22" height="150" rx="11" fill="url(#straw)" transform="rotate(14 207 93)"/>
  <rect x="200" y="18" width="6" height="150" rx="3" fill="#ffffff" opacity="0.35" transform="rotate(14 207 93)"/>

  <!-- strawberry garnish -->
  <g transform="translate(112 58)">
    <path d="M20 6 C40 6 52 26 46 48 C42 64 30 76 20 76 C10 76 -2 64 -6 48 C-12 26 0 6 20 6 Z" fill="url(#strawberrySkin)"/>
    <circle cx="12" cy="30" r="1.6" fill="#ffe9c2"/>
    <circle cx="24" cy="24" r="1.6" fill="#ffe9c2"/>
    <circle cx="32" cy="36" r="1.6" fill="#ffe9c2"/>
    <circle cx="16" cy="48" r="1.6" fill="#ffe9c2"/>
    <circle cx="28" cy="52" r="1.6" fill="#ffe9c2"/>
    <circle cx="10" cy="60" r="1.6" fill="#ffe9c2"/>
    <path d="M6 8 L14 -8 L20 6 L26 -10 L32 8 Z" fill="#3fa855"/>
    <path d="M6 8 L14 -8 L20 6 L26 -10 L32 8 Z" fill="none" stroke="#2c7a3d" stroke-width="1"/>
  </g>

  <!-- mint leaf accent -->
  <g transform="translate(230 66) rotate(20)">
    <path d="M0 20 C0 4 14 -6 28 0 C26 14 14 24 0 20 Z" fill="#4fb567"/>
    <path d="M2 18 C10 12 18 6 26 2" stroke="#2c7a3d" stroke-width="1.2" fill="none"/>
  </g>
</svg>
