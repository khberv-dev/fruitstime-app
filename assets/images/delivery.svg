<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8b57f"/>
      <stop offset="100%" stop-color="#cf9a63"/>
    </linearGradient>
    <linearGradient id="boxFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cf9a63"/>
      <stop offset="100%" stop-color="#a9713d"/>
    </linearGradient>
    <linearGradient id="boxSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9c6a37"/>
      <stop offset="100%" stop-color="#7d5227"/>
    </linearGradient>
    <linearGradient id="tape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf1dc"/>
      <stop offset="100%" stop-color="#ecd9ae"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#e6512f"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="205" cy="336" rx="120" ry="16" fill="url(#shadow)"/>

  <!-- box side (right, darker) -->
  <path d="M262 150 L300 172 L300 300 L262 322 Z" fill="url(#boxSide)"/>
  <!-- box front -->
  <path d="M96 172 L262 150 L262 322 L96 300 Z" fill="url(#boxFront)"/>
  <!-- box top -->
  <path d="M96 172 L150 132 L316 130 L262 150 Z" fill="url(#boxTop)"/>

  <!-- front flap crease shading -->
  <path d="M96 172 L262 150 L262 178 L96 200 Z" fill="#000000" opacity="0.08"/>

  <!-- tape across top -->
  <path d="M200 132 L226 131 L216 322 L192 322 Z" fill="url(#tape)" opacity="0.95"/>
  <!-- tape across front-left to top -->
  <path d="M96 220 L262 198 L262 214 L96 236 Z" fill="url(#tape)" opacity="0.9"/>

  <!-- corrugated edge texture lines on front -->
  <path d="M104 214 L254 194" stroke="#7d5227" stroke-width="2" opacity="0.35"/>
  <path d="M104 250 L254 232" stroke="#7d5227" stroke-width="2" opacity="0.3"/>
  <path d="M104 284 L254 268" stroke="#7d5227" stroke-width="2" opacity="0.25"/>

  <!-- shipping label -->
  <rect x="112" y="228" width="66" height="52" rx="4" fill="#fbf7ee" transform="rotate(-4 145 254)"/>
  <g transform="rotate(-4 145 254)">
    <rect x="118" y="236" width="4" height="18" fill="#2b2b2b"/>
    <rect x="124" y="236" width="2" height="18" fill="#2b2b2b"/>
    <rect x="128" y="236" width="3" height="18" fill="#2b2b2b"/>
    <rect x="133" y="236" width="5" height="18" fill="#2b2b2b"/>
    <rect x="140" y="236" width="2" height="18" fill="#2b2b2b"/>
    <rect x="144" y="236" width="4" height="18" fill="#2b2b2b"/>
    <rect x="150" y="236" width="3" height="18" fill="#2b2b2b"/>
    <rect x="155" y="236" width="4" height="18" fill="#2b2b2b"/>
    <rect x="120" y="260" width="52" height="4" rx="2" fill="#c9b98f"/>
    <rect x="120" y="268" width="36" height="4" rx="2" fill="#c9b98f"/>
  </g>

  <!-- motion lines -->
  <path d="M28 150 H62" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M14 180 H50" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <path d="M30 210 H58" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

  <!-- location pin -->
  <g transform="translate(272 40)">
    <ellipse cx="26" cy="90" rx="16" ry="5" fill="#000000" opacity="0.15"/>
    <path d="M26 0 C42 0 54 12 54 27 C54 47 26 78 26 78 C26 78 -2 47 -2 27 C-2 12 10 0 26 0 Z" fill="url(#pin)"/>
    <circle cx="26" cy="27" r="12" fill="#ffffff"/>
    <circle cx="26" cy="27" r="6" fill="#e6512f"/>
  </g>
</svg>
