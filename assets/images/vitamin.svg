<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffc247"/>
      <stop offset="45%" stop-color="#ff9f1c"/>
      <stop offset="100%" stop-color="#dd7f00"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8dce2"/>
    </linearGradient>
    <linearGradient id="capsuleOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8fae"/>
      <stop offset="100%" stop-color="#e83f75"/>
    </linearGradient>
    <linearGradient id="capsuleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7cd3f2"/>
      <stop offset="100%" stop-color="#2f9dcf"/>
    </linearGradient>
    <radialGradient id="tablet" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbe6ee"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="185" cy="350" rx="110" ry="16" fill="url(#shadow)"/>

  <!-- bottle body -->
  <rect x="120" y="140" width="120" height="190" rx="26" fill="url(#bottle)"/>
  <rect x="120" y="140" width="34" height="190" rx="17" fill="#ffffff" opacity="0.18"/>
  <rect x="120" y="140" width="120" height="190" rx="26" fill="none" stroke="#b56900" stroke-opacity="0.35" stroke-width="2"/>

  <!-- neck + cap -->
  <rect x="150" y="112" width="60" height="34" rx="8" fill="#f2b23e"/>
  <rect x="142" y="84" width="76" height="30" rx="9" fill="url(#cap)" stroke="#c3c9d1" stroke-width="1.5"/>
  <line x1="150" y1="90" x2="150" y2="108" stroke="#c3c9d1" stroke-width="2"/>
  <line x1="160" y1="88" x2="160" y2="110" stroke="#c3c9d1" stroke-width="2"/>
  <line x1="170" y1="87" x2="170" y2="111" stroke="#c3c9d1" stroke-width="2"/>
  <line x1="180" y1="87" x2="180" y2="111" stroke="#c3c9d1" stroke-width="2"/>
  <line x1="190" y1="88" x2="190" y2="110" stroke="#c3c9d1" stroke-width="2"/>
  <line x1="200" y1="90" x2="200" y2="108" stroke="#c3c9d1" stroke-width="2"/>

  <!-- label -->
  <rect x="128" y="196" width="104" height="86" rx="8" fill="#ffffff" fill-opacity="0.94"/>
  <rect x="128" y="196" width="104" height="86" rx="8" fill="none" stroke="#f0c68a" stroke-width="1.5"/>
  <circle cx="148" cy="216" r="7" fill="none" stroke="#ff9f1c" stroke-width="2.5"/>
  <path d="M148 210 C152 213 152 219 148 222 C144 219 144 213 148 210 Z" fill="#4fb567"/>
  <rect x="164" y="211" width="56" height="8" rx="4" fill="#ff9f1c"/>
  <rect x="140" y="234" width="80" height="6" rx="3" fill="#e7e2d8"/>
  <rect x="140" y="248" width="64" height="6" rx="3" fill="#e7e2d8"/>
  <rect x="140" y="262" width="72" height="6" rx="3" fill="#e7e2d8"/>

  <!-- capsule 1 -->
  <g transform="translate(250 150) rotate(35)">
    <rect x="0" y="0" width="70" height="30" rx="15" fill="#ffffff"/>
    <path d="M35 0 h20 a15 15 0 0 1 0 30 h-20 z" fill="url(#capsuleOrange)"/>
    <ellipse cx="16" cy="9" rx="10" ry="4" fill="#ffffff" opacity="0.75"/>
  </g>

  <!-- capsule 2 -->
  <g transform="translate(60 230) rotate(-24)">
    <rect x="0" y="0" width="60" height="26" rx="13" fill="#ffffff"/>
    <path d="M30 0 h15 a13 13 0 0 1 0 26 h-15 z" fill="url(#capsuleBlue)"/>
    <ellipse cx="14" cy="8" rx="9" ry="3.4" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- round tablet -->
  <g transform="translate(70 130)">
    <circle cx="20" cy="20" r="20" fill="url(#tablet)" stroke="#c9d3dc" stroke-width="1.5"/>
    <line x1="6" y1="20" x2="34" y2="20" stroke="#c9d3dc" stroke-width="2"/>
    <ellipse cx="13" cy="12" rx="6" ry="3" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- soft shadows under loose pills -->
  <ellipse cx="275" cy="196" rx="26" ry="6" fill="#000000" opacity="0.08"/>
  <ellipse cx="82" cy="268" rx="22" ry="5" fill="#000000" opacity="0.08"/>
  <ellipse cx="90" cy="176" rx="18" ry="4" fill="#000000" opacity="0.08"/>
</svg>
