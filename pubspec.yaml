name: fruitstime
description: "FruitsTime mobile app"

publish_to: 'none'

version: 1.4.8+36

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  pinput: ^6.0.2
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  go_router: ^17.2.1
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.2.4
  talker_dio_logger: ^5.1.16
  pretty_qr_code: ^3.6.0
  lottie: ^3.3.3
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  jiffy: ^6.4.4
  birth_picker: ^1.2.0
  # API key is set natively in AppDelegate.swift (YMKMapKit.setApiKey).
  # Geocoding uses the Yandex HTTP Geocoder API (see geocoding_repository.dart).
  yandex_mapkit: 4.2.1
  geolocator: ^14.0.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_inappwebview: ^6.1.5
  upgrader: ^13.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# geolocator_linux (an unused desktop platform impl) caps package_info_plus at
# ^9; override to keep ^10 for the iOS/Android targets we actually build.
dependency_overrides:
  package_info_plus: ^10.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/anim/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/brand.png